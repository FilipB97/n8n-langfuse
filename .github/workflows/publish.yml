name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: node ./scripts/clean-dist.mjs && ./node_modules/.bin/tsc -p . && node ./scripts/copy-assets.mjs

      - name: Lint
        run: ./node_modules/.bin/eslint "nodes/**/*.ts" "credentials/**/*.ts" --max-warnings 0

      - name: Run tests
        run: npm test

      - name: Publish to npm (skip if already published)
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "::notice::$NAME@$VERSION is already on npm — skipping publish."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release from CHANGELOG (skip if it exists)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "::notice::Release $TAG already exists — skipping."
          else
            if node scripts/changelog-section.mjs "$VERSION" > RELEASE_NOTES.md; then
              gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md
            else
              gh release create "$TAG" --title "$TAG" --generate-notes
            fi
          fi
