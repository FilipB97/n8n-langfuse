name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: ./node_modules/.bin/tsc -p . --noEmit

      - name: Lint (n8n node conventions)
        run: ./node_modules/.bin/eslint "nodes/**/*.ts" "credentials/**/*.ts"

      - name: Run tests
        run: ./node_modules/.bin/tsx --test tests/**/*.test.ts
